<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#EEECEA"/>
  <link rel="manifest" href="manifest.json"/>
  <title>Worth It?</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;900&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#EEECEA;
      --card:#FFFFFF;
      --card-warm:#E8E5E0;
      --ink:#111110;
      --ink-mid:#5A5855;
      --ink-faint:#A8A5A0;
      --border:#DEDAD4;
      --terra1:#D4895A;
      --terra2:#B5603A;
      --sand1:#E0C49A;
      --sand2:#C8A070;
      --expensive:#C94030;
      --fair:#3A7A50;
      --deal:#2A5FA0;
      --f:'DM Sans',sans-serif;
    }
    body{background:var(--bg);font-family:var(--f);color:var(--ink);min-height:100vh}
    ::-webkit-scrollbar{display:none}
    .app{max-width:430px;margin:0 auto;min-height:100vh}
    .screen{padding-bottom:96px;display:none}
    .screen.active{display:block}

    /* ── HEADER ── */
    .hd{padding:24px 16px 12px;display:flex;justify-content:space-between;align-items:flex-start}
    .hd-title{font-size:36px;font-weight:900;letter-spacing:-.04em;line-height:1}
    .hd-sub{font-size:12px;color:var(--ink-faint);margin-top:5px;font-weight:500}
    .hd-btn{width:40px;height:40px;background:var(--card);border-radius:50%;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}

    /* ── EDITORIAL GRID ── */
    .eg{padding:4px 10px;display:flex;flex-direction:column;gap:8px}
    .eblock{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:auto auto auto;gap:8px}

    /* Grid placement */
    .pos-tall{grid-column:1;grid-row:1/3}
    .pos-r1  {grid-column:2;grid-row:1}
    .pos-r2  {grid-column:2;grid-row:2}
    .pos-bl  {grid-column:1;grid-row:3}
    .pos-br  {grid-column:2;grid-row:3}

    /* ── BASE CARD ── */
    .card{border-radius:18px;overflow:hidden;cursor:pointer;transition:transform .12s;position:relative;display:flex;flex-direction:column;justify-content:space-between;padding:14px}
    .card:active{transform:scale(0.96)}

    /* Heights */
    .pos-tall{min-height:290px}
    .pos-r1  {min-height:130px}
    .pos-r2  {min-height:148px}
    .pos-bl  {min-height:160px}
    .pos-br  {min-height:160px}

    /* White card */
    .card-white{background:var(--card)}
    /* Warm gray card */
    .card-warm{background:var(--card-warm)}
    /* Gradient/image card */
    .card-grad{color:#fff}
    .card-grad .cat-lbl{color:rgba(255,255,255,.65)}
    .card-grad .arrow-btn{background:rgba(255,255,255,.18)}

    /* Gradient presets */
    .g-terra{background:linear-gradient(160deg,#E09060 0%,#B05030 60%,#803820 100%)}
    .g-sand {background:linear-gradient(160deg,#E8CC98 0%,#C89858 60%,#A87840 100%)}
    .g-slate{background:linear-gradient(160deg,#8A9AAA 0%,#506070 60%,#384858 100%)}
    .g-sage {background:linear-gradient(160deg,#90A888 0%,#607860 60%,#485840 100%)}
    .g-rose {background:linear-gradient(160deg,#D8A898 0%,#B07868 60%,#885848 100%)}
    .g-dusk {background:linear-gradient(160deg,#8888B0 0%,#585880 60%,#383860 100%)}

    /* Card top row */
    .card-top{display:flex;justify-content:space-between;align-items:flex-start}
    .cat-lbl{font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-faint);line-height:1.3}
    .arrow-btn{width:26px;height:26px;border-radius:50%;background:rgba(0,0,0,.07);display:flex;align-items:center;justify-content:center;flex-shrink:0}

    /* Amount */
    .card-amount{font-weight:900;line-height:.95;letter-spacing:-.04em;margin-top:auto;padding-top:12px}
    .card-white .card-amount,.card-warm .card-amount{color:var(--ink)}
    .card-grad .card-amount{color:#fff}
    .cur-tag{font-size:.3em;font-weight:700;opacity:.6;vertical-align:super;letter-spacing:.02em;margin-right:1px}

    /* Font sizes by digit length */
    .f-xl{font-size:42px}
    .f-lg{font-size:34px}
    .f-md{font-size:26px}
    .f-sm{font-size:21px}

    /* Vote meta */
    .card-meta{font-size:10px;font-weight:600;margin-top:8px}
    .card-white .card-meta,.card-warm .card-meta{color:var(--ink-faint)}
    .card-grad .card-meta{color:rgba(255,255,255,.55)}

    /* ── VOTE SCREEN ── */
    .sp{padding:0 16px 90px}
    .back-btn{display:flex;align-items:center;gap:6px;padding:8px 16px;border-radius:30px;background:var(--card);border:1px solid var(--border);font-size:13px;font-weight:600;color:var(--ink-mid);cursor:pointer;margin:16px 0 14px;width:fit-content}
    .vote-hero{height:220px;border-radius:22px;overflow:hidden;position:relative;margin-bottom:18px}
    .vote-hero .vh-grad{position:absolute;inset:0}
    .vh-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.05),rgba(0,0,0,.55))}
    .vh-tag{position:absolute;top:14px;left:14px;padding:5px 12px;background:rgba(255,255,255,.88);border-radius:30px;font-size:10px;font-weight:700;color:var(--ink);letter-spacing:.05em;text-transform:uppercase}
    .vh-amt{position:absolute;bottom:18px;left:18px}
    .vh-amt .cur{font-size:14px;color:rgba(255,255,255,.75);vertical-align:super;margin-right:2px;font-weight:700}
    .vh-amt .num{font-size:42px;font-weight:900;color:#fff;letter-spacing:-.04em;line-height:1}
    .v-sit{font-size:15px;color:var(--ink-mid);line-height:1.6;margin-bottom:22px}
    .v-lbl{font-size:11px;font-weight:700;color:var(--ink-faint);letter-spacing:.07em;text-transform:uppercase;margin-bottom:12px}
    .v-opt{display:flex;align-items:center;gap:14px;padding:15px 16px;border-radius:16px;border:1.5px solid var(--border);background:var(--card);margin-bottom:10px;cursor:pointer;transition:all .15s}
    .v-opt.se{border-color:var(--expensive);background:rgba(201,64,48,.05)}
    .v-opt.sf{border-color:var(--fair);background:rgba(58,122,80,.05)}
    .v-opt.sd{border-color:var(--deal);background:rgba(42,95,160,.05)}
    .v-ico{width:40px;height:40px;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
    .v-txt h3{font-size:14px;font-weight:700;color:var(--ink)}
    .v-txt p{font-size:12px;color:var(--ink-faint);margin-top:2px}
    .cmt-box{border:1.5px solid var(--border);border-radius:16px;background:var(--card);padding:14px;margin-top:16px;display:none}
    .cmt-box textarea{width:100%;border:none;outline:none;resize:none;font-family:var(--f);font-size:13px;color:var(--ink);background:transparent;line-height:1.5;height:60px}
    .cc-txt{text-align:right;font-size:10px;color:var(--ink-faint)}
    .sub-btn{width:100%;padding:17px;background:var(--ink);color:#fff;border:none;border-radius:16px;font-family:var(--f);font-size:15px;font-weight:700;cursor:pointer;margin-top:16px;display:none;letter-spacing:-.01em}

    /* ── POST ── */
    .ph{padding:22px 0 18px}
    .ph h2{font-size:28px;font-weight:900;letter-spacing:-.03em}
    .ph p{font-size:13px;color:var(--ink-mid);margin-top:4px}
    .fl{font-size:10px;font-weight:700;color:var(--ink-faint);letter-spacing:.07em;text-transform:uppercase;margin-bottom:10px;display:block}
    .fg{margin-bottom:22px}
    .cg{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
    .cb{padding:12px 4px;border-radius:14px;border:1.5px solid var(--border);background:var(--card);font-family:var(--f);font-size:10px;font-weight:700;color:var(--ink-faint);cursor:pointer;text-align:center;transition:all .12s}
    .cb.active{border-color:var(--ink);background:var(--ink);color:#fff}
    .ce{font-size:20px;display:block;margin-bottom:5px}
    .ar{display:flex;gap:8px}
    .cs{width:82px;padding:13px;border:1.5px solid var(--border);border-radius:14px;background:var(--card);font-family:var(--f);font-size:14px;color:var(--ink);outline:none}
    .ai{flex:1;padding:13px 16px;border:1.5px solid var(--border);border-radius:14px;background:var(--card);font-family:var(--f);font-size:22px;font-weight:900;color:var(--ink);outline:none}
    .si{width:100%;padding:13px 16px;border:1.5px solid var(--border);border-radius:14px;background:var(--card);font-family:var(--f);font-size:14px;color:var(--ink);outline:none;resize:none;height:88px;line-height:1.5}
    .ai:focus,.cs:focus,.si:focus{border-color:var(--ink)}
    .pb{width:100%;padding:17px;background:var(--ink);color:#fff;border:none;border-radius:16px;font-family:var(--f);font-size:15px;font-weight:700;cursor:pointer}
    .pb:disabled{opacity:.3;cursor:not-allowed}

    /* ── RESULTS ── */
    .rc{background:var(--card);border-radius:20px;border:1px solid var(--border);padding:18px;margin-bottom:14px}
    .rb{margin-bottom:14px}
    .rbh{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
    .rbl{font-size:13px;font-weight:700}
    .rp{font-size:18px;font-weight:900;letter-spacing:-.02em}
    .bt{height:8px;background:var(--bg);border-radius:4px;overflow:hidden}
    .bf{height:100%;border-radius:4px;transition:width .8s ease}
    .vb{padding:12px 14px;border-radius:12px;margin-top:14px;font-size:13px;font-weight:700}
    .ft{display:flex;gap:6px;margin-bottom:16px}
    .ftb{flex:1;text-align:center;padding:8px 0;border-radius:30px;background:var(--card);border:1px solid var(--border);color:var(--ink-mid);font-size:12px;font-weight:700;cursor:pointer;font-family:var(--f)}
    .ftb.active{background:var(--ink);color:#fff;border-color:var(--ink)}

    /* ── BOTTOM NAV (pill style) ── */
    .bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(238,236,234,.92);backdrop-filter:blur(16px);border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;padding:10px 14px 28px;z-index:100;overflow-x:auto}
    .nav-pill{display:flex;align-items:center;gap:6px;padding:10px 18px;border-radius:30px;cursor:pointer;font-size:13px;font-weight:700;white-space:nowrap;flex-shrink:0;transition:all .15s}
    .nav-pill.dark{background:var(--ink);color:#fff}
    .nav-pill.light{background:rgba(255,255,255,.7);border:1px solid var(--border);color:var(--ink-mid)}
    .nav-pill.active-light{background:var(--card);border:1px solid var(--border);color:var(--ink)}
    .nav-dot{width:8px;height:8px;background:#C94030;border-radius:50%;margin-left:2px}
    .nav-plus{width:40px;height:40px;background:var(--ink);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;margin-left:auto}

    /* Loading */
    .loading{text-align:center;padding:40px 20px;color:var(--ink-faint)}
    .ld{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--terra1);margin:0 3px;animation:bop 1.2s infinite}
    .ld:nth-child(2){animation-delay:.2s}.ld:nth-child(3){animation-delay:.4s}
    @keyframes bop{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}

    /* Toast */
    .toast{position:fixed;bottom:110px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:12px 22px;border-radius:30px;font-size:13px;font-weight:700;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
    .toast.show{opacity:1}
  </style>
</head>
<body>
<div class="app">

  <!-- FEED -->
  <div class="screen active" id="screen-feed">
    <div class="hd">
      <div>
        <div class="hd-title">Worth It?</div>
        <div class="hd-sub">Your spending. Their verdict.</div>
      </div>
      <div class="hd-btn">
        <svg width="16" height="14" viewBox="0 0 16 14" fill="none"><path d="M1 2h14M3 7h10M6 12h4" stroke="#5A5855" stroke-width="1.6" stroke-linecap="round"/></svg>
      </div>
    </div>
    <div id="feed-list">
      <div class="loading"><div class="ld"></div><div class="ld"></div><div class="ld"></div></div>
    </div>
  </div>

  <!-- VOTE -->
  <div class="screen" id="screen-vote">
    <div class="sp">
      <button class="back-btn" onclick="goScreen('feed')">
        <svg width="8" height="14" viewBox="0 0 8 14" fill="none"><path d="M7 1L1 7L7 13" stroke="#5A5855" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>Back
      </button>
      <div class="vote-hero">
        <div class="vh-grad" id="vote-grad"></div>
        <div class="vh-overlay"></div>
        <span class="vh-tag" id="vote-cat">—</span>
        <div class="vh-amt"><span class="cur" id="vote-cur"></span><span class="num" id="vote-num">—</span></div>
      </div>
      <p class="v-sit" id="vote-desc">—</p>
      <p class="v-lbl">Your verdict</p>
      <div class="v-opt" id="opt-expensive" onclick="sv('expensive')">
        <div class="v-ico">💸</div><div class="v-txt"><h3>Too Expensive</h3><p>Not worth it at this price</p></div>
      </div>
      <div class="v-opt" id="opt-fair" onclick="sv('fair')">
        <div class="v-ico">✅</div><div class="v-txt"><h3>Fair Price</h3><p>Seems about right</p></div>
      </div>
      <div class="v-opt" id="opt-deal" onclick="sv('deal')">
        <div class="v-ico">🤑</div><div class="v-txt"><h3>Great Deal</h3><p>I'd pay that in a heartbeat</p></div>
      </div>
      <div class="cmt-box" id="cmt-box">
        <textarea id="cmt-in" placeholder="Why do you think so? (optional)" maxlength="80" oninput="document.getElementById('cc').textContent=this.value.length"></textarea>
        <div class="cc-txt"><span id="cc">0</span>/80</div>
      </div>
      <button class="sub-btn" id="sub-btn" onclick="submitVote()">Submit Verdict →</button>
    </div>
  </div>

  <!-- POST -->
  <div class="screen" id="screen-post">
    <div class="sp">
      <div class="ph"><h2>Ask the<br>community</h2><p>Is your spending worth it?</p></div>
      <div class="fg">
        <label class="fl">Category</label>
        <div class="cg">
          <button class="cb" onclick="spc(this,'Food & Drink')"><span class="ce">🍽️</span>Food</button>
          <button class="cb" onclick="spc(this,'Housing')"><span class="ce">🏠</span>Housing</button>
          <button class="cb" onclick="spc(this,'Fashion')"><span class="ce">👗</span>Fashion</button>
          <button class="cb" onclick="spc(this,'Travel')"><span class="ce">✈️</span>Travel</button>
          <button class="cb" onclick="spc(this,'Tech')"><span class="ce">💻</span>Tech</button>
          <button class="cb" onclick="spc(this,'Health')"><span class="ce">🏥</span>Health</button>
          <button class="cb" onclick="spc(this,'Education')"><span class="ce">📚</span>Education</button>
          <button class="cb" onclick="spc(this,'Other')"><span class="ce">💡</span>Other</button>
        </div>
      </div>
      <div class="fg">
        <label class="fl">Amount</label>
        <div class="ar">
          <select class="cs" id="post-cur"><option>USD</option><option>KRW</option><option>CNY</option><option>EUR</option><option>GBP</option><option>JPY</option></select>
          <input class="ai" type="number" id="post-amt" placeholder="0" oninput="cpr()"/>
        </div>
      </div>
      <div class="fg">
        <label class="fl">Situation <span style="color:var(--ink-faint);font-weight:400;text-transform:none;letter-spacing:0">(max 120 chars)</span></label>
        <textarea class="si" id="post-sit" maxlength="120" placeholder="e.g. Omakase dinner for 2 in Gangnam — 9 courses included." oninput="cpr()"></textarea>
      </div>
      <button class="pb" id="post-btn" onclick="submitQ()" disabled>Post Question</button>
    </div>
  </div>

  <!-- RESULTS -->
  <div class="screen" id="screen-results">
    <div class="sp">
      <button class="back-btn" onclick="goScreen('feed')">
        <svg width="8" height="14" viewBox="0 0 8 14" fill="none"><path d="M7 1L1 7L7 13" stroke="#5A5855" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>Back
      </button>
      <div id="res-qcard" style="margin-bottom:14px"></div>
      <div class="ft"><button class="ftb active">All</button></div>
      <div class="rc" id="res-bars">
        <div class="loading"><div class="ld"></div><div class="ld"></div><div class="ld"></div></div>
      </div>
    </div>
  </div>

  <!-- NAV -->
  <nav class="bottom-nav">
    <div class="nav-pill dark" onclick="goScreen('feed')">
      Feed <div class="nav-dot"></div>
    </div>
    <div class="nav-pill light active-light" onclick="goScreen('results')">Results</div>
    <div class="nav-pill light" onclick="goScreen('post')">+ Ask</div>
    <div class="nav-plus" onclick="goScreen('post')" style="display:none">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 3V15M3 9H15" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/></svg>
    </div>
  </nav>
</div>
<div class="toast" id="toast"></div>

<script>
const {createClient}=supabase;
const sb=createClient(
  'https://umrnupowquzziyifrygq.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVtcm51cG93cXV6eml5aWZyeWdxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2OTY1ODMsImV4cCI6MjA5NTI3MjU4M30.lNeFBXvWBY30khaoXoyBjxTIs2PL3wY08YLP2X6uTXs'
);

// Category → warm gradient class
const GRADS={
  'Food & Drink':'g-terra',
  'Housing':'g-sand',
  'Fashion':'g-rose',
  'Travel':'g-sand',
  'Tech':'g-slate',
  'Health':'g-sage',
  'Education':'g-dusk',
  'Other':'g-terra',
};

const GRAD_CSS={
  'g-terra':'linear-gradient(160deg,#E09060 0%,#B05030 60%,#803820 100%)',
  'g-sand' :'linear-gradient(160deg,#E8CC98 0%,#C89858 60%,#A87840 100%)',
  'g-slate':'linear-gradient(160deg,#8A9AAA 0%,#506070 60%,#384858 100%)',
  'g-sage' :'linear-gradient(160deg,#90A888 0%,#607860 60%,#485840 100%)',
  'g-rose' :'linear-gradient(160deg,#D8A898 0%,#B07868 60%,#885848 100%)',
  'g-dusk' :'linear-gradient(160deg,#8888B0 0%,#585880 60%,#383860 100%)',
};

let curQ=null,selV=null,postCat=null,allQ=[];

function goScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+id).classList.add('active');
  window.scrollTo(0,0);
}

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

function tLeft(exp){
  const d=new Date(exp)-new Date();
  if(d<0)return'Closed';
  const h=Math.floor(d/3600000);
  return h<24?`${h}h`:`${Math.floor(h/24)}d`;
}

function fSize(n){
  const l=String(n).replace(/,/g,'').length;
  if(l>=7)return'f-sm';
  if(l>=5)return'f-md';
  if(l>=4)return'f-lg';
  return'f-xl';
}

const ARR=`<svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M2 9L9 2M9 2H3.5M9 2V7.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

// Build a single card HTML
function buildCard(q, posClass, style){
  const g=GRADS[q.category]||'g-terra';
  const isGrad=(style==='grad');
  const cardType=isGrad?`card-grad ${g}`:(style==='warm'?'card-warm':'card-white');
  const arrowColor=isGrad?'rgba(255,255,255,0.8)':'#A8A5A0';
  const amt=Number(q.amount).toLocaleString();

  return`<div class="card ${cardType} ${posClass}" onclick="openVote('${q.id}')">
    <div class="card-top">
      <div class="cat-lbl">${q.category}</div>
      <div class="arrow-btn" style="color:${arrowColor}">${ARR}</div>
    </div>
    <div>
      <div class="card-amount ${fSize(q.amount)}"><span class="cur-tag">${q.currency}</span>${amt}</div>
      <div class="card-meta">${q.responses||0} votes · ${tLeft(q.expires_at)}</div>
    </div>
  </div>`;
}

function renderFeed(questions){
  const list=document.getElementById('feed-list');
  if(!questions.length){
    list.innerHTML='<div class="loading" style="padding:60px 20px">No questions yet.<br>Be the first to ask!</div>';
    return;
  }

  // Pattern per 5 cards:
  // [0] tall grad (left, rows 1-2)
  // [1] white small (right row 1)
  // [2] warm mid (right row 2)
  // [3] white (left row 3)
  // [4] grad (right row 3)
  // styles alternate per block

  const styles=[
    ['grad','white','warm','white','grad'],
    ['sand','warm','white','grad','white'],
  ];
  // map style names to actual style param
  const styleMap={'grad':'grad','white':'white','warm':'warm','sand':'grad'};

  let html='<div class="eg">';
  let blockIdx=0;

  for(let i=0;i<questions.length;i+=5){
    const s=styles[blockIdx%2];
    const q=questions;
    html+=`<div class="eblock">`;
    if(q[i])  html+=buildCard(q[i],  'pos-tall', styleMap[s[0]]);
    if(q[i+1])html+=buildCard(q[i+1],'pos-r1',   styleMap[s[1]]);
    if(q[i+2])html+=buildCard(q[i+2],'pos-r2',   styleMap[s[2]]);
    if(q[i+3])html+=buildCard(q[i+3],'pos-bl',   styleMap[s[3]]);
    if(q[i+4])html+=buildCard(q[i+4],'pos-br',   styleMap[s[4]]);
    html+=`</div>`;
    blockIdx++;
  }

  html+='</div>';
  list.innerHTML=html;
}

async function loadFeed(){
  const {data,error}=await sb.from('questions').select('*').order('created_at',{ascending:false});
  if(error){document.getElementById('feed-list').innerHTML='<div class="loading">Failed to load.</div>';return;}
  allQ=data||[];
  renderFeed(allQ);
}

async function openVote(id){
  curQ=allQ.find(q=>q.id===id);
  if(!curQ)return;
  const g=GRADS[curQ.category]||'g-terra';
  document.getElementById('vote-grad').style.background=GRAD_CSS[g]||GRAD_CSS['g-terra'];
  document.getElementById('vote-cat').textContent=curQ.category;
  document.getElementById('vote-cur').textContent=curQ.currency+' ';
  document.getElementById('vote-num').textContent=Number(curQ.amount).toLocaleString();
  document.getElementById('vote-desc').textContent=curQ.situation;
  selV=null;
  document.querySelectorAll('.v-opt').forEach(o=>o.className='v-opt');
  document.getElementById('sub-btn').style.display='none';
  document.getElementById('cmt-box').style.display='none';
  document.getElementById('cmt-in').value='';
  document.getElementById('cc').textContent='0';
  goScreen('vote');
}

function sv(type){
  selV=type;
  document.querySelectorAll('.v-opt').forEach(o=>o.className='v-opt');
  document.getElementById('opt-'+type).className='v-opt s'+type[0];
  document.getElementById('sub-btn').style.display='block';
  document.getElementById('cmt-box').style.display='block';
}

async function submitVote(){
  if(!selV||!curQ)return;
  const btn=document.getElementById('sub-btn');
  btn.disabled=true;btn.textContent='Submitting...';
  const cmt=document.getElementById('cmt-in').value.trim();
  const {error}=await sb.from('votes').insert({question_id:curQ.id,verdict:selV,comment:cmt||null});
  if(error){toast('Something went wrong!');btn.disabled=false;btn.textContent='Submit Verdict →';return;}
  await sb.from('questions').update({responses:(curQ.responses||0)+1}).eq('id',curQ.id);
  curQ.responses=(curQ.responses||0)+1;
  toast('Verdict submitted! 🎉');
  await loadRes(curQ.id);
  goScreen('results');
  btn.disabled=false;btn.textContent='Submit Verdict →';
  loadFeed();
}

async function loadRes(id){
  const q=allQ.find(q=>q.id===id)||curQ;
  if(!q)return;
  const g=GRADS[q.category]||'g-terra';
  const gc=GRAD_CSS[g];
  document.getElementById('res-qcard').innerHTML=`
    <div style="height:150px;border-radius:20px;overflow:hidden;position:relative;margin-bottom:14px;background:${gc}">
      <div style="position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.05),rgba(0,0,0,.55))"></div>
      <span style="position:absolute;top:12px;left:12px;padding:5px 12px;background:rgba(255,255,255,.88);border-radius:30px;font-size:10px;font-weight:700;color:#111;letter-spacing:.05em;text-transform:uppercase">${q.category}</span>
      <div style="position:absolute;bottom:14px;left:16px">
        <span style="font-size:12px;color:rgba(255,255,255,.75);vertical-align:super;margin-right:2px;font-weight:700">${q.currency}</span>
        <span style="font-size:32px;font-weight:900;color:#fff;letter-spacing:-.04em;line-height:1">${Number(q.amount).toLocaleString()}</span>
      </div>
    </div>
    <p style="font-size:14px;color:var(--ink-mid);line-height:1.5;margin-bottom:8px">${q.situation}</p>
    <div style="display:flex;gap:8px;margin-bottom:14px">
      <span style="font-size:11px;color:var(--ink-faint);font-weight:600">${q.responses||0} responses</span>
      <span style="color:var(--ink-faint)">·</span>
      <span style="font-size:11px;color:var(--ink-faint);font-weight:600">${tLeft(q.expires_at)} remaining</span>
    </div>`;

  const {data:votes}=await sb.from('votes').select('verdict').eq('question_id',id);
  const tot=votes?.length||0;
  const exp=votes?.filter(v=>v.verdict==='expensive').length||0;
  const fai=votes?.filter(v=>v.verdict==='fair').length||0;
  const del=votes?.filter(v=>v.verdict==='deal').length||0;
  const pct=n=>tot?Math.round(n/tot*100):0;
  const eP=pct(exp),fP=pct(fai),dP=pct(del);
  const tv=eP>=fP&&eP>=dP?'💸 Most say too expensive':fP>=dP?'✅ Most think it\'s fair':'🤑 Most think it\'s a great deal';
  const tc=eP>=fP&&eP>=dP?'var(--expensive)':fP>=dP?'var(--fair)':'var(--deal)';
  const tb=eP>=fP&&eP>=dP?'rgba(201,64,48,.08)':fP>=dP?'rgba(58,122,80,.08)':'rgba(42,95,160,.08)';
  document.getElementById('res-bars').innerHTML=tot===0?'<div class="loading">No votes yet. Be the first!</div>':`
    <div class="rb"><div class="rbh"><span class="rbl">💸 Too Expensive</span><span class="rp" style="color:var(--expensive)">${eP}%</span></div><div class="bt"><div class="bf" style="width:${eP}%;background:var(--expensive)"></div></div></div>
    <div class="rb"><div class="rbh"><span class="rbl">✅ Fair Price</span><span class="rp" style="color:var(--fair)">${fP}%</span></div><div class="bt"><div class="bf" style="width:${fP}%;background:var(--fair)"></div></div></div>
    <div class="rb"><div class="rbh"><span class="rbl">🤑 Great Deal</span><span class="rp" style="color:var(--deal)">${dP}%</span></div><div class="bt"><div class="bf" style="width:${dP}%;background:var(--deal)"></div></div></div>
    <div class="vb" style="background:${tb};border:1px solid ${tc}33;color:${tc}">${tv}</div>
    <div style="margin-top:12px;font-size:11px;color:var(--ink-faint);text-align:center;font-weight:600">${tot} total vote${tot!==1?'s':''}</div>`;
}

function spc(el,cat){
  document.querySelectorAll('.cb').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');postCat=cat;cpr();
}
function cpr(){
  const a=document.getElementById('post-amt').value;
  const s=document.getElementById('post-sit').value.trim();
  document.getElementById('post-btn').disabled=!(postCat&&a&&s);
}
async function submitQ(){
  const btn=document.getElementById('post-btn');
  btn.disabled=true;btn.textContent='Posting...';
  const {data,error}=await sb.from('questions').insert({
    category:postCat,
    currency:document.getElementById('post-cur').value,
    amount:parseInt(document.getElementById('post-amt').value),
    situation:document.getElementById('post-sit').value.trim(),
  }).select().single();
  if(error){toast('Failed to post!');btn.disabled=false;btn.textContent='Post Question';return;}
  toast('Question posted! 🎉');
  document.querySelectorAll('.cb').forEach(b=>b.classList.remove('active'));
  document.getElementById('post-amt').value='';
  document.getElementById('post-sit').value='';
  postCat=null;btn.textContent='Post Question';
  await loadFeed();
  goScreen('feed');
}

loadFeed();
</script>
</body>
</html>
